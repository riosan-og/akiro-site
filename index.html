<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Akiro Laine | SIN</title>

  <meta name="description" content="Listen to SIN by Akiro Laine on Spotify, Apple Music, and YouTube." />

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Helvetica, Arial, sans-serif;
      background: #050008;
    }

    body {
      min-height: 100vh;
      background-image:
        linear-gradient(
          rgba(0, 0, 0, 0.08),
          rgba(0, 0, 0, 0.38)
        ),
        url("./face_chest.png");

      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #particles {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 2;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;

      background:
        radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.55) 100%),
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.36),
          transparent 34%,
          rgba(0, 0, 0, 0.68)
        );
    }

    .artist-name {
      position: absolute;
      top: 5vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;

      color: #ffe45c;
      font-size: clamp(2.3rem, 8vw, 7.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;

      text-shadow:
        0 0 10px rgba(255, 228, 92, 0.95),
        0 0 34px rgba(255, 191, 0, 0.72),
        0 8px 34px rgba(0, 0, 0, 0.95);

      animation: floatName 6s ease-in-out infinite;
    }

    .album-title {
      position: absolute;
      top: 22vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;

      color: #ffe45c;
      font-size: clamp(1.1rem, 3vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      text-align: center;

      text-shadow:
        0 0 8px rgba(255, 228, 92, 0.9),
        0 0 22px rgba(255, 191, 0, 0.65),
        0 5px 22px rgba(0, 0, 0, 0.95);

      animation: floatAlbum 6.5s ease-in-out infinite;
    }

    .links {
      position: absolute;
      left: 7vw;
      bottom: 8vh;
      z-index: 5;

      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;

      text-align: left;

      animation: floatLinks 5s ease-in-out infinite;
    }

    .links a {
      color: #ffe45c;
      text-decoration: none;

      font-size: clamp(1.3rem, 3.2vw, 2.45rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;

      text-shadow:
        0 0 8px rgba(255, 228, 92, 0.95),
        0 0 22px rgba(255, 191, 0, 0.72),
        0 5px 24px rgba(0, 0, 0, 0.98);

      transition:
        transform 0.25s ease,
        color 0.25s ease,
        text-shadow 0.25s ease;
    }

    .links a:hover {
      color: #fff6ad;
      transform: translateX(8px) scale(1.04);

      text-shadow:
        0 0 12px rgba(255, 246, 173, 1),
        0 0 34px rgba(255, 208, 0, 0.9),
        0 6px 26px rgba(0, 0, 0, 1);
    }

    @keyframes floatName {
      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(10px);
      }
    }

    @keyframes floatAlbum {
      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(8px);
      }
    }

    @keyframes floatLinks {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-14px);
      }
    }

    @media (max-width: 700px) {
      body {
        background-position: center top;
      }

      .artist-name {
        top: 4vh;
        font-size: clamp(2rem, 11vw, 4.7rem);
        letter-spacing: 0.05em;
      }

      .album-title {
        top: 18vh;
        font-size: clamp(1rem, 4.5vw, 1.6rem);
        letter-spacing: 0.28em;
      }

      .links {
        left: 6vw;
        bottom: 5vh;
        gap: 10px;
      }

      .links a {
        font-size: clamp(1.2rem, 6vw, 2rem);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <canvas id="particles"></canvas>

    <div class="vignette"></div>

    <h1 class="artist-name">Akiro Laine</h1>
    <div class="album-title">SIN</div>

    <nav class="links" aria-label="Music links">
      <a
        href="https://open.spotify.com/album/3SbWVRs3AOhfW8C1Izz2yk"
        target="_blank"
        rel="noopener noreferrer"
      >
        Spotify
      </a>

      <a
        href="https://music.apple.com/us/album/sin/6777102586"
        target="_blank"
        rel="noopener noreferrer"
      >
        Apple Music
      </a>

      <a
        href="https://www.youtube.com/@AkiroLaine"
        target="_blank"
        rel="noopener noreferrer"
      >
        YouTube
      </a>
    </nav>
  </main>

  <script>
    const IMAGE_PATH = "./face_chest.png";

    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d", { alpha: true });

    const desktopReference = {
      width: 1440,
      height: 900,
      subjectParticles: 5500,
      floatingParticles: 850
    };

    const imageSampling = {
      sampleWidth: 250
    };

    let width = 0;
    let height = 0;
    let dpr = 1;

    let img = new Image();

    let candidatePixels = [];
    let subjectParticles = [];
    let floatingParticles = [];

    let activeSettings = null;
    let resizeTimer = null;
    let imageReady = false;

    let imageRect = {
      x: 0,
      y: 0,
      w: 0,
      h: 0
    };

    img.crossOrigin = "anonymous";

    img.onload = () => {
      imageReady = true;
      resize();
      extractCandidatePixels();
      rebuildAllParticles();
      requestAnimationFrame(animate);
    };

    img.onerror = () => {
      console.error("Could not load image:", IMAGE_PATH);
      imageReady = false;
      resize();
      rebuildAllParticles();
      requestAnimationFrame(animate);
    };

    img.src = IMAGE_PATH;

    window.addEventListener("resize", () => {
      resize();

      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(() => {
        const nextSettings = getResponsiveSettings();

        if (
          !activeSettings ||
          Math.abs(nextSettings.subjectParticles - activeSettings.subjectParticles) > 120 ||
          Math.abs(nextSettings.floatingParticles - activeSettings.floatingParticles) > 40
        ) {
          rebuildAllParticles();
        } else {
          rebuildParticleTargetsOnly();
        }
      }, 180);
    });

    function getResponsiveSettings() {
      const screenArea = width * height;
      const referenceArea = desktopReference.width * desktopReference.height;

      let areaScale = screenArea / referenceArea;

      const isPhone = width <= 700;
      const isSmallPhone = width <= 430;

      areaScale = clamp(areaScale, 0.18, 1.0);

      let mobilePenalty = 1;

      if (isSmallPhone) {
        mobilePenalty = 0.66;
      } else if (isPhone) {
        mobilePenalty = 0.76;
      }

      const subjectParticles = Math.round(
        desktopReference.subjectParticles * areaScale * mobilePenalty
      );

      const floatingParticles = Math.round(
        desktopReference.floatingParticles * areaScale * (isPhone ? 0.55 : 1)
      );

      return {
        isPhone,

        subjectParticles: clampInt(subjectParticles, isPhone ? 850 : 2200, desktopReference.subjectParticles),
        floatingParticles: clampInt(floatingParticles, isPhone ? 90 : 260, desktopReference.floatingParticles),

        particleSizeMin: isPhone ? 1.25 : 2.0,
        particleSizeMax: isPhone ? 3.8 : 5.8,

        pullStrength: isPhone ? 0.016 : 0.018,
        damping: isPhone ? 0.925 : 0.91,
        flowStrength: isPhone ? 0.16 : 0.30,

        glowChance: isPhone ? 0.055 : 0.16,
        alphaMultiplier: isPhone ? 0.62 : 1.0,

        orbitMin: isPhone ? 4 : 8,
        orbitMax: isPhone ? 18 : 42
      };
    }

    function resize() {
      const isPhone = window.innerWidth <= 700;

      dpr = isPhone
        ? Math.min(window.devicePixelRatio || 1, 1.5)
        : Math.min(window.devicePixelRatio || 1, 2);

      width = window.innerWidth;
      height = window.innerHeight;

      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);

      canvas.style.width = width + "px";
      canvas.style.height = height + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      calculateImageRect();
    }

    function calculateImageRect() {
      if (!img.width || !img.height) return;

      const scale = Math.max(width / img.width, height / img.height);

      imageRect.w = img.width * scale;
      imageRect.h = img.height * scale;
      imageRect.x = (width - imageRect.w) / 2;
      imageRect.y = (height - imageRect.h) / 2;
    }

    function extractCandidatePixels() {
      if (!imageReady) return;

      const sampleWidth = imageSampling.sampleWidth;
      const sampleHeight = Math.round(sampleWidth * (img.height / img.width));

      const off = document.createElement("canvas");
      off.width = sampleWidth;
      off.height = sampleHeight;

      const offCtx = off.getContext("2d", { willReadFrequently: true });
      offCtx.drawImage(img, 0, 0, sampleWidth, sampleHeight);

      const pixels = offCtx.getImageData(0, 0, sampleWidth, sampleHeight).data;
      const bg = estimateBackgroundColor(pixels, sampleWidth, sampleHeight);

      const candidates = [];

      for (let y = 0; y < sampleHeight; y += 2) {
        for (let x = 0; x < sampleWidth; x += 2) {
          const i = (y * sampleWidth + x) * 4;

          const r = pixels[i] / 255;
          const g = pixels[i + 1] / 255;
          const b = pixels[i + 2] / 255;
          const a = pixels[i + 3] / 255;

          const lum = r * 0.2126 + g * 0.7152 + b * 0.0722;
          const bgDistance = colorDistance(r, g, b, bg.r, bg.g, bg.b);

          const darkDetail = smoothstep(0.55, 0.08, lum) * 0.55;
          const skinDetail = r > g && g > b ? 0.32 : 0.0;
          const edgeDetail = smoothstep(0.10, 0.28, bgDistance);

          const density = Math.min(1, edgeDetail + darkDetail + skinDetail) * a;

          if (density > 0.20 && Math.random() < density) {
            candidates.push({
              sx: x / sampleWidth,
              sy: y / sampleHeight,
              r,
              g,
              b,
              density
            });
          }
        }
      }

      shuffle(candidates);
      candidatePixels = candidates;
    }

    function rebuildAllParticles() {
      activeSettings = getResponsiveSettings();

      buildSubjectParticles();
      buildFloatingParticles();
    }

    function buildSubjectParticles() {
      subjectParticles = [];

      if (!candidatePixels.length) return;

      const pool = candidatePixels.slice();
      shuffle(pool);

      const chosen = pool.slice(0, activeSettings.subjectParticles);

      subjectParticles = chosen.map((p) => {
        const target = imageToScreen(p.sx, p.sy);
        const color = makeParticleColor(p.r, p.g, p.b, p.density);

        return {
          sx: p.sx,
          sy: p.sy,
          tx: target.x,
          ty: target.y,

          x: target.x + randomRange(-width, width),
          y: target.y + randomRange(-height, height),

          vx: 0,
          vy: 0,

          size: randomRange(activeSettings.particleSizeMin, activeSettings.particleSizeMax),
          angle: Math.random() * Math.PI * 2,
          spin: randomRange(-0.035, 0.035),
          seed: Math.random() * 1000,
          orbit: randomRange(activeSettings.orbitMin, activeSettings.orbitMax),
          color,
          alpha: randomRange(0.34, 0.86) * activeSettings.alphaMultiplier,
          glow: Math.random() < activeSettings.glowChance
        };
      });
    }

    function buildFloatingParticles() {
      floatingParticles = [];

      const colorList = [
        "rgba(255, 228, 92, 0.95)",
        "rgba(255, 100, 190, 0.85)",
        "rgba(120, 255, 180, 0.85)",
        "rgba(90, 210, 255, 0.80)",
        "rgba(255, 255, 255, 0.72)"
      ];

      for (let i = 0; i < activeSettings.floatingParticles; i++) {
        floatingParticles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: randomRange(-0.18, 0.18),
          vy: randomRange(-0.35, 0.12),
          size: randomRange(activeSettings.particleSizeMin, activeSettings.particleSizeMax),
          angle: Math.random() * Math.PI * 2,
          spin: randomRange(-0.025, 0.025),
          seed: Math.random() * 1000,
          color: colorList[Math.floor(Math.random() * colorList.length)],
          alpha: randomRange(0.22, 0.74) * activeSettings.alphaMultiplier
        });
      }
    }

    function rebuildParticleTargetsOnly() {
      calculateImageRect();

      for (const p of subjectParticles) {
        const target = imageToScreen(p.sx, p.sy);
        p.tx = target.x;
        p.ty = target.y;
      }
    }

    function animate(time) {
      const t = time * 0.001;

      ctx.clearRect(0, 0, width, height);

      drawFloatingParticles(t);
      drawSubjectParticles(t);

      requestAnimationFrame(animate);
    }

    function drawSubjectParticles(t) {
      if (!activeSettings) return;

      for (const p of subjectParticles) {
        const flowAngle =
          Math.sin(p.x * 0.006 + t * 0.9 + p.seed) +
          Math.cos(p.y * 0.005 - t * 0.7 + p.seed * 0.41);

        const flowX = Math.cos(flowAngle * Math.PI) * activeSettings.flowStrength;
        const flowY = Math.sin(flowAngle * Math.PI) * activeSettings.flowStrength;

        const orbitX = Math.cos(t * 0.8 + p.seed) * p.orbit;
        const orbitY = Math.sin(t * 0.7 + p.seed) * p.orbit;

        const pulse = Math.sin(t * 0.65 + p.seed) * 0.5 + 0.5;

        const targetX = p.tx + orbitX * pulse;
        const targetY = p.ty + orbitY * pulse;

        p.vx += (targetX - p.x) * activeSettings.pullStrength + flowX;
        p.vy += (targetY - p.y) * activeSettings.pullStrength + flowY;

        p.vx *= activeSettings.damping;
        p.vy *= activeSettings.damping;

        p.x += p.vx;
        p.y += p.vy;

        p.angle += p.spin;

        drawTriangle(p.x, p.y, p.size, p.angle, p.color, p.alpha, p.glow);
      }
    }

    function drawFloatingParticles(t) {
      if (!activeSettings) return;

      for (const p of floatingParticles) {
        const flowAngle =
          Math.sin(p.x * 0.004 + t * 0.45 + p.seed) +
          Math.cos(p.y * 0.006 - t * 0.35 + p.seed);

        p.vx += Math.cos(flowAngle * Math.PI) * 0.026;
        p.vy += Math.sin(flowAngle * Math.PI) * 0.026;

        p.vx *= 0.985;
        p.vy *= 0.985;

        p.x += p.vx;
        p.y += p.vy;

        p.angle += p.spin;

        if (p.x < -40) p.x = width + 40;
        if (p.x > width + 40) p.x = -40;
        if (p.y < -40) p.y = height + 40;
        if (p.y > height + 40) p.y = -40;

        drawTriangle(p.x, p.y, p.size, p.angle, p.color, p.alpha, false);
      }
    }

    function drawTriangle(x, y, size, angle, color, alpha, glow) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);

      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;

      if (glow) {
        ctx.shadowColor = color;
        ctx.shadowBlur = size * 2.1;
      } else {
        ctx.shadowBlur = 0;
      }

      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.86, size * 0.62);
      ctx.lineTo(-size * 0.86, size * 0.62);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function imageToScreen(sx, sy) {
      return {
        x: imageRect.x + sx * imageRect.w,
        y: imageRect.y + sy * imageRect.h
      };
    }

    function estimateBackgroundColor(data, w, h) {
      const points = [
        [8, 8],
        [w - 8, 8],
        [8, h - 8],
        [w - 8, h - 8],
        [w / 2, 8],
        [w / 2, h - 8]
      ];

      let r = 0;
      let g = 0;
      let b = 0;

      for (const point of points) {
        const x = Math.floor(point[0]);
        const y = Math.floor(point[1]);
        const i = (y * w + x) * 4;

        r += data[i] / 255;
        g += data[i + 1] / 255;
        b += data[i + 2] / 255;
      }

      return {
        r: r / points.length,
        g: g / points.length,
        b: b / points.length
      };
    }

    function makeParticleColor(r, g, b, density) {
      const boost = 0.88 + density * 0.62;

      const rr = Math.min(255, Math.floor((r * 255 + 36) * boost));
      const gg = Math.min(255, Math.floor((g * 255 + 18) * boost));
      const bb = Math.min(255, Math.floor((b * 255 + 58) * boost));

      return `rgba(${rr}, ${gg}, ${bb}, 1)`;
    }

    function colorDistance(r1, g1, b1, r2, g2, b2) {
      const dr = r1 - r2;
      const dg = g1 - g2;
      const db = b1 - b2;
      return Math.sqrt(dr * dr + dg * dg + db * db);
    }

    function smoothstep(edge0, edge1, x) {
      const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
      return t * t * (3 - 2 * t);
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function clampInt(value, min, max) {
      return Math.round(Math.max(min, Math.min(max, value)));
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = array[i];
        array[i] = array[j];
        array[j] = temp;
      }
    }
  </script>
</body>
</html>
