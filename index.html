<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Form</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #070010; font-family: sans-serif; }
    canvas { position: fixed; inset: 0; display: block; }
    .social-links { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 20; }
    .social-links a { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 14px; text-transform: uppercase; }
    .social-links a:hover { color: #ffffff; }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="social-links">
    <a href="https://open.spotify.com/album/3SbWVRs3AOhfW8C1Izz2yk" target="_blank">Spotify</a>
    <a href="https://music.apple.com/us/album/sin/6777102586" target="_blank">Apple Music</a>
    <a href="https://www.youtube.com/@AkiroLaine" target="_blank">YouTube</a>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    
    // 1. CONFIGURATION
    const IMAGE_SRC = "./face_chest.png"; // Ensure your file is named exactly this
    const SETTINGS = { maxParticles: 30000, sampleWidth: 200, sampleStep: 2, densityThreshold: 0.1, formScale: 3, formDepth: 50, particleSize: 2, returnForce: 0.02, turbulenceForce: 0.3, swirlForce: 0.001, damping: 0.9, noiseScale: 0.005, noiseSpeed: 0.1 };

    // 2. SETUP SCENE
    const canvas = document.getElementById("stage");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1000);
    camera.position.z = 1;

    // 3. LOAD IMAGE & RUN
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
        console.log("Image loaded!");
        initParticles(img);
    };
    img.onerror = () => alert("Error: Could not load face_chest.png. Ensure it is in the same folder.");
    img.src = IMAGE_SRC;

    function initParticles(img) {
        const offscreen = document.createElement("canvas");
        offscreen.width = SETTINGS.sampleWidth;
        offscreen.height = (img.height / img.width) * SETTINGS.sampleWidth;
        const ctx = offscreen.getContext("2d");
        ctx.drawImage(img, 0, 0, offscreen.width, offscreen.height);
        const data = ctx.getImageData(0, 0, offscreen.width, offscreen.height).data;

        const pos = [];
        for (let i = 0; i < data.length; i += 4) {
            if (data[i + 3] > 128) { // Only keep opaque pixels
                const x = (i / 4) % offscreen.width;
                const y = Math.floor((i / 4) / offscreen.width);
                pos.push((x - offscreen.width/2) * 2, (offscreen.height/2 - y) * 2, 0);
            }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
        const material = new THREE.PointsMaterial({ size: SETTINGS.particleSize, color: 0xffffff, transparent: true });
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    }
  </script>
</body>
</html>
