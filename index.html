<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Akiro Laine | SIN</title>

  <meta name="description" content="Listen to SIN by Akiro Laine on Spotify, Apple Music, and YouTube." />

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Helvetica, Arial, sans-serif;
      background: #070010;
    }

    body {
      min-height: 100vh;
      background-image:
        linear-gradient(
          rgba(10, 0, 24, 0.10),
          rgba(10, 0, 24, 0.46)
        ),
        url("./face_chest.png");

      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 38%, rgba(0, 0, 0, 0.55) 100%),
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.30),
          transparent 35%,
          rgba(0, 0, 0, 0.62)
        );
      z-index: 1;
    }

    .artist-name {
      position: absolute;
      top: 5vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;

      color: #ffe45c;
      font-size: clamp(2.3rem, 8vw, 7.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;

      text-shadow:
        0 0 10px rgba(255, 228, 92, 0.95),
        0 0 34px rgba(255, 191, 0, 0.72),
        0 8px 34px rgba(0, 0, 0, 0.95);

      animation: floatName 6s ease-in-out infinite;
    }

    .album-title {
      position: absolute;
      top: 22vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;

      color: #ffe45c;
      font-size: clamp(1.1rem, 3vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      text-align: center;

      text-shadow:
        0 0 8px rgba(255, 228, 92, 0.9),
        0 0 22px rgba(255, 191, 0, 0.65),
        0 5px 22px rgba(0, 0, 0, 0.95);

      animation: floatAlbum 6.5s ease-in-out infinite;
    }

    .links {
      position: absolute;
      left: 7vw;
      bottom: 8vh;
      z-index: 3;

      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 12px;

      text-align: left;

      animation: floatLinks 5s ease-in-out infinite;
    }

    .links a {
      color: #ffe45c;
      text-decoration: none;

      font-size: clamp(1.3rem, 3.2vw, 2.45rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;

      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;

      text-shadow:
        0 0 8px rgba(255, 228, 92, 0.95),
        0 0 22px rgba(255, 191, 0, 0.72),
        0 5px 24px rgba(0, 0, 0, 0.98);

      transition:
        transform 0.25s ease,
        color 0.25s ease,
        text-shadow 0.25s ease;
    }

    .links a:hover {
      color: #fff6ad;
      transform: translateX(8px) scale(1.04);

      text-shadow:
        0 0 12px rgba(255, 246, 173, 1),
        0 0 34px rgba(255, 208, 0, 0.9),
        0 6px 26px rgba(0, 0, 0, 1);
    }

    @keyframes floatName {
      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(10px);
      }
    }

    @keyframes floatAlbum {
      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(8px);
      }
    }

    @keyframes floatLinks {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-14px);
      }
    }

    @media (max-width: 700px) {
      body {
        background-position: center top;
      }

      .artist-name {
        top: 4vh;
        font-size: clamp(2rem, 11vw, 4.7rem);
        letter-spacing: 0.05em;
      }

      .album-title {
        top: 18vh;
        font-size: clamp(1rem, 4.5vw, 1.6rem);
        letter-spacing: 0.28em;
      }

      .links {
        left: 6vw;
        bottom: 5vh;
        gap: 10px;
      }

      .links a {
        font-size: clamp(1.2rem, 6vw, 2rem);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="vignette"></div>

    <h1 class="artist-name">Akiro Laine</h1>
    <div class="album-title">SIN</div>

    <nav class="links" aria-label="Music links">
      <a
        href="https://open.spotify.com/album/3SbWVRs3AOhfW8C1Izz2yk"
        target="_blank"
        rel="noopener noreferrer"
      >
        Spotify
      </a>

      <a
        href="https://music.apple.com/us/album/sin/6777102586"
        target="_blank"
        rel="noopener noreferrer"
      >
        Apple Music
      </a>

      <a
        href="https://www.youtube.com/@AkiroLaine"
        target="_blank"
        rel="noopener noreferrer"
      >
        YouTube
      </a>
    </nav>
  </main>
</body>
</html>
