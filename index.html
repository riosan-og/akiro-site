<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Single Particle</title>
  <style>
    body {
      margin: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #070010;
    }

    /* This is the particle */
    .particle {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 50px 20px rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>

  <div class="particle"></div>

</body>
</html>
