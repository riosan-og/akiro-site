<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Akiro Laine | SIN</title>

  <meta name="description" content="Listen to SIN by Akiro Laine on Spotify, Apple Music, and YouTube." />

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Helvetica, Arial, sans-serif;
      background: #070010;
    }

    body {
      min-height: 100vh;
      background-image:
        linear-gradient(
          rgba(10, 0, 24, 0.12),
          rgba(10, 0, 24, 0.48)
        ),
        url("./face_chest.png");

      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 36%, rgba(0, 0, 0, 0.58) 100%),
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.38),
          transparent 34%,
          rgba(0, 0, 0, 0.62)
        );
      z-index: 1;
    }

    .artist-name {
      position: absolute;
      top: 5.5vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;

      color: #ffe45c;
      font-size: clamp(2.3rem, 8vw, 7.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;

      text-shadow:
        0 0 10px rgba(255, 228, 92, 0.95),
        0 0 34px rgba(255, 191, 0, 0.72),
        0 8px 34px rgba(0, 0, 0, 0.95);

      animation: floatName 6s ease-in-out infinite;
    }

    .album-title {
      position: absolute;
      top: calc(5.5vh + clamp(3.2rem, 9vw, 8.4rem));
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;

      color: #ff1f1f;
      font-size: clamp(1rem, 2.8vw, 2rem);
      font-weight: 900;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-align: center;

      text-shadow:
        0 0 8px rgba(255, 228, 92, 0.9),
        0 0 22px rgba(255, 191, 0, 0.65),
        0 5px 22px rgba(0, 0, 0, 0.95);

      animation: floatAlbum 6.5s ease-in-out infinite;
    }

    .links {
      position: absolute;
      left: 50%;
      bottom: 7vh;
      transform: translateX(-50%);
      z-index: 3;

      display: flex;
      gap: 30px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;

      width: min(92vw, 1000px);

      animation: floatLinks 5s ease-in-out infinite;
    }

    .links a {
      color: #ffe45c;
      text-decoration: none;

      font-size: clamp(1.2rem, 3vw, 2.25rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;

      padding: 0.28em 0.42em;
      border: 2px solid rgba(255, 228, 92, 0.78);
      border-radius: 999px;

      background: rgba(12, 0, 25, 0.28);
      backdrop-filter: blur(6px);

      text-shadow:
        0 0 8px rgba(255, 228, 92, 0.95),
        0 0 22px rgba(255, 191, 0, 0.7),
        0 4px 20px rgba(0, 0, 0, 0.95);

      box-shadow:
        0 0 18px rgba(255, 228, 92, 0.28),
        inset 0 0 18px rgba(255, 228, 92, 0.08);

      transition:
        transform 0.25s ease,
        color 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease;
    }

    .links a:hover {
      color: #fff6ad;
      border-color: rgba(255, 246, 173, 1);

      transform: translateY(-6px) scale(1.06);

      box-shadow:
        0 0 26px rgba(255, 228, 92, 0.5),
        0 0 54px rgba(255, 191, 0, 0.28),
        inset 0 0 22px rgba(255, 228, 92, 0.12);
    }

    @keyframes floatName {
      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(10px);
      }
    }

    @keyframes floatAlbum {
      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(7px);
      }
    }

    @keyframes floatLinks {
      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(-14px);
      }
    }

    @media (max-width: 700px) {
      body {
        background-position: center top;
      }

      .artist-name {
        top: 4vh;
        font-size: clamp(2rem, 11vw, 4.7rem);
        letter-spacing: 0.05em;
      }

      .album-title {
        top: calc(4vh + clamp(2.8rem, 13vw, 5.3rem));
        font-size: clamp(0.9rem, 4vw, 1.4rem);
        letter-spacing: 0.22em;
      }

      .links {
        bottom: 4.5vh;
        gap: 14px;
        flex-direction: column;
      }

      .links a {
        font-size: clamp(1.15rem, 5.8vw, 1.85rem);
        width: min(78vw, 360px);
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="vignette"></div>

    <h1 class="artist-name">Akiro Laine</h1>
    <div class="album-title">SIN</div>

    <nav class="links" aria-label="Music links">
      <a
        href="https://open.spotify.com/album/3SbWVRs3AOhfW8C1Izz2yk"
        target="_blank"
        rel="noopener noreferrer"
      >
        Spotify
      </a>

      <a
        href="https://music.apple.com/us/album/sin/6777102586"
        target="_blank"
        rel="noopener noreferrer"
      >
        Apple Music
      </a>

      <a
        href="https://www.youtube.com/@AkiroLaine"
        target="_blank"
        rel="noopener noreferrer"
      >
        YouTube
      </a>
    </nav>
  </main>
</body>
</html>
