<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akiro Laine | Official Hub</title>
    <style>
        /* Dark Cyberpunk / High-Fashion Aesthetic */
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: rgba(15, 15, 20, 0.75);
            --text-color: #e2e2e9;
            --accent-cyan: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.2);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.05) 0%, transparent 40%);
        }

        /* Glassmorphic Container */
        .hub-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 950px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 242, 255, 0.05);
        }

        /* Left Side Image Frame */
        .image-frame {
            flex: 1;
            max-width: 45%;
            position: relative;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border-glass);
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* Right Side: Content Panel */
        .content-panel {
            flex: 1.2;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        header p {
            font-size: 1rem;
            color: #8a8a93;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Platform Links */
        .platform-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .platform-link:hover {
            background: rgba(0, 242, 255, 0.08);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .platform-name {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .platform-name svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .action-tag {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6a6a73;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .platform-link:hover .action-tag {
            color: var(--accent-cyan);
            border-color: var(--accent-cyan);
        }

        /* Responsive Layout for Mobile */
        @media (max-width: 768px) {
            .hub-container {
                flex-direction: column;
            }
            .image-frame {
                max-width: 100%;
                height: 450px;
                border-right: none;
                border-bottom: 1px solid var(--border-glass);
            }
            .content-panel {
                padding: 30px 20px;
                text-align: center;
            }
            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <!-- FIXED: Full Body PNG Image Frame -->
        <div class="image-frame">
            <img src="full_body.png" alt="Akiro Laine">
        </div>

        <!-- Links Panel -->
        <div class="content-panel">
            <header>

                    <div class="platform-name">

            </div>
        </div>
    </div>

</body>
</html>
